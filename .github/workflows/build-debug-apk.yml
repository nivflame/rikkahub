name: Build Debug APK

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platform and build-tools
        run: sdkmanager "platforms;android-37.0" "build-tools;37.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web-ui/pnpm-lock.yaml

      - name: Install web-ui dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web-ui

      - name: Write google-services.json
        run: |
          echo '{"project_info":{"project_number":"000000000000","project_id":"dummy"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"me.rerere.rikkahub"}},"api_key":[{"current_key":"AIzaSyZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZ"}]},{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000001","android_client_info":{"package_name":"me.rerere.rikkahub.debug"}},"api_key":[{"current_key":"AIzaSyZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZZ"}]}],"configuration_version":"1"}' > app/google-services.json

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-debug-apk
          path: app/build/outputs/apk/debug/*.apk
